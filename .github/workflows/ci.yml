name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DATABASE_URL: file:./dev.db
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      # PR上はbun-pin-sync.ymlが自動修正するのでこれはpost-merge failsafe
      - name: Verify bun version pins are in sync
        if: github.event_name == 'push'
        run: |
          bun_file=$(cat .bun-version)
          docker_tag=$(grep -oP '(?<=^FROM oven/bun:)\S+' e2e/authentik/Dockerfile.app)
          pkg_manager=$(grep -oP '(?<="packageManager": "bun@)[^"]+' package.json)
          echo ".bun-version=$bun_file Dockerfile.app=$docker_tag packageManager=$pkg_manager"
          if [ "$bun_file" != "$docker_tag" ] || [ "$bun_file" != "$pkg_manager" ]; then
            echo "::error::bun version pins disagree on $GITHUB_REF — bun-pin-sync should have caught this on the PR"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for untrusted install scripts
        run: |
          out=$(bun pm untrusted 2>&1)
          echo "$out"
          echo "$out" | grep -q '^Found 0 untrusted dependencies'

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Format check (oxfmt)
        run: bun run format:check

      - name: Lint (oxlint)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  e2e-authentik:
    name: e2e (authentik)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      DATABASE_URL: file:./dev.db
      AUTHENTIK_BOOTSTRAP_EMAIL: "admin@localhost"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      # ::add-mask::でログ出力時にも秘匿される
      - name: Generate per-run secrets
        run: |
          pg_pass=$(openssl rand -hex 16)
          bootstrap_pwd=$(openssl rand -hex 16)
          bootstrap_token=$(openssl rand -hex 32)
          echo "::add-mask::$pg_pass"
          echo "::add-mask::$bootstrap_pwd"
          echo "::add-mask::$bootstrap_token"
          {
            echo "PG_PASS=$pg_pass"
            echo "AUTHENTIK_BOOTSTRAP_PASSWORD=$bootstrap_pwd"
            echo "AUTHENTIK_BOOTSTRAP_TOKEN=$bootstrap_token"
          } >> "$GITHUB_ENV"

      # testcontainers経由ではなく直接compose upすることでテスト失敗後もログ採取可能にする
      - name: Bring up authentik stack
        working-directory: e2e/authentik
        run: |
          cat > .env <<EOF
          PG_PASS=${PG_PASS}
          AUTHENTIK_SECRET_KEY=ci-secret-$(openssl rand -hex 32)
          AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL}
          AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD}
          AUTHENTIK_BOOTSTRAP_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN}
          CADDY_PORT_HTTP=8080
          AUTHENTIK_PORT_HTTP=9000
          AUTHENTIK_PORT_HTTPS=9443
          EOF
          # 引数なしwaitは常に0を返すのでPIDごとに個別待機する
          docker compose --env-file .env pull &
          pull_pid=$!
          docker compose --env-file .env build music-analyzer &
          build_pid=$!
          status=0
          wait "$pull_pid" || status=$?
          wait "$build_pid" || status=$?
          [ "$status" -eq 0 ]
          docker compose --env-file .env up -d --pull never

      - name: Show initial container state
        working-directory: e2e/authentik
        run: docker compose --env-file .env ps

      - name: Wait for authentik to become healthy
        run: |
          deadline=$(( $(date +%s) + 600 ))
          while :; do
            if curl -fsS -o /dev/null http://localhost:9000/-/health/ready/; then
              echo "authentik /-/health/ready/ returned 200"
              break
            fi
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::authentik did not become healthy within 10 minutes"
              exit 1
            fi
            echo "waiting for authentik... ($((deadline - now))s left)"
            sleep 5
          done

      - name: Run authentik e2e
        env:
          AUTHENTIK_E2E_CADDY_URL: http://localhost:8080
          AUTHENTIK_E2E_AUTHENTIK_URL: http://localhost:9000
        run: bun run e2e:authentik

      # 全ログをartifact化し、UI用にtail-200を各serviceについて表示
      - name: Collect compose logs and state
        if: always()
        working-directory: e2e/authentik
        env:
          LOGS_DIR: ${{ runner.temp }}/authentik-e2e-logs
        run: |
          mkdir -p "$LOGS_DIR"
          docker compose --env-file .env ps -a > "$LOGS_DIR/docker-compose-ps.txt" 2>&1 || true
          for svc in postgresql redis authentik-server authentik-worker music-analyzer caddy; do
            docker compose --env-file .env logs --no-color --no-log-prefix "$svc" \
              > "$LOGS_DIR/$svc.log" 2>&1 || true
          done

          echo "::group::docker compose ps"
          cat "$LOGS_DIR/docker-compose-ps.txt" || true
          echo "::endgroup::"
          for svc in postgresql redis authentik-server authentik-worker music-analyzer caddy; do
            echo "::group::$svc (tail 200 — full log in artifact)"
            tail -200 "$LOGS_DIR/$svc.log" || true
            echo "::endgroup::"
          done

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: authentik-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/authentik-e2e-logs
          retention-days: 14
          if-no-files-found: warn

      - name: Tear down
        if: always()
        working-directory: e2e/authentik
        run: docker compose --env-file .env down --volumes --timeout 5 || true

  # PRのactivity streamは失敗とcomment createしか流れないので、
  # 全green時に毎回新規commentをpostしてcreateイベントを発火させる
  notify-pr-green:
    name: notify PR (all green)
    needs: [check, e2e-authentik]
    # forkはGITHUB_TOKENがread-onlyでcomment POSTが403になり緑PRが赤くなる
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          marker='<!-- ci-status -->'
          body=$(printf '%s\n✅ all CI jobs passed on `%s` — [run](%s)' \
            "$marker" "${SHA:0:7}" "$RUN_URL")
          payload=$(jq -n --arg body "$body" '{body: $body}')
          api="https://api.github.com/repos/$REPO"
          auth_header="Authorization: Bearer $GH_TOKEN"
          accept_header='Accept: application/vnd.github+json'

          # 新規comment作成より前にidを採取しないと自分自身を消してしまう
          old_ids=$(curl -fsS -H "$auth_header" -H "$accept_header" \
            "$api/issues/$PR/comments?per_page=100" \
            | jq -r \
                --arg m "$marker" \
                --arg legacy '<!-- e2e-authentik-status -->' \
                '.[] | select(.body | contains($m) or contains($legacy)) | .id')

          curl -fsS -X POST -H "$auth_header" -H "$accept_header" \
            -d "$payload" "$api/issues/$PR/comments" -o /dev/null
          echo "Created new status comment"

          for id in $old_ids; do
            curl -sS -o /dev/null -w 'deleted comment %{url_effective} -> %{http_code}\n' \
              -X DELETE -H "$auth_header" -H "$accept_header" \
              "$api/issues/comments/$id" || true
          done
